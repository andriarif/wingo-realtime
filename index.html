.number{

    font-size:20px;

.big{
    background:#22c55e;
}

.small{
    background:#ef4444;

.footer{

    text-align:center;
    color:#94a3b8;

async function loadData(){

    try{

        const response = await fetch(
            'https://spin88.sbs/api/webapi/GetNoaverageEmerdList',
            {

                method:'POST',

                mode:'cors',

                credentials:'include',

                headers:{

                    'Accept':
                    'application/json, text/plain, */*',

                    'Content-Type':
                    'application/x-www-form-urlencoded',

                    'Authorization':
                    'Bearer ' + TOKEN,

                    'X-Requested-With':
                    'XMLHttpRequest',

                    'Referer':
                    'https://spin88.sbs/wingo/?game_type=1'

                },

                body:
                'typeid=1&pageno=0&pageto=10&language=vi'

            }
        );

        const data = await response.json();

        console.log(data);

        if(!data.data){

            throw new Error(
                'API INVALID'
            );

        }

        const games =
            data.data.gameslist;

        let html = '';

        games.forEach(item=>{

            const size =
                item.amount >= 5
                ? 'BIG'
                : 'SMALL';

            const color =
                item.amount >= 5
                ? 'big'
                : 'small';

            html += `

            <tr>

                <td>
                    <div class="period">
                        ${item.period}
                    </div>
                </td>

                <td>
                    <div class="number ${color}">
                        ${item.amount}
                    </div>
                </td>

                <td>
                    ${size}
                </td>

            </tr>

            `;

        });

        document.getElementById(
            'resultTable'
        ).innerHTML = html;

        document.getElementById(
            'status'
        ).innerText =
            'LIVE CONNECTED';

        document.getElementById(
            'status'
        ).style.color =
            '#22c55e';

    }catch(error){

        console.log(error);

        alert(error);

        document.getElementById(
            'status'
        ).innerText =
            'API ERROR';

        document.getElementById(
            'status'
        ).style.color =
            '#ef4444';

    }

}

loadData();

setInterval(loadData,5000);
