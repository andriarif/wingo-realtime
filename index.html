<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WINGO REALTIME</title>

<style>

body{
    background:#020617;
    color:white;
    font-family:Arial,sans-serif;
    padding:15px;
}

.card{
    background:#0f172a;
    border-radius:20px;
    padding:20px;
}

.title{
    font-size:32px;
    margin-bottom:15px;
}

.status{
    margin-bottom:15px;
    color:#22c55e;
    font-size:18px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#334155;
    padding:12px;
}

td{
    border:1px solid #334155;
    padding:12px;
    text-align:center;
}

.number{
    width:40px;
    height:40px;
    line-height:40px;
    border-radius:50%;
    display:inline-block;
    font-weight:bold;
}

.big{
    background:#22c55e;
}

.small{
    background:#ef4444;
}

.period{
    font-size:12px;
    color:#94a3b8;
}

</style>
</head>

<body>

<div class="card">

<div class="title">
WINGO API REALTIME
</div>

<div id="status" class="status">
CONNECTING...
</div>

<table>

<thead>
<tr>
<th>Period</th>
<th>Number</th>
<th>Size</th>
</tr>
</thead>

<tbody id="resultTable">

</tbody>

</table>

</div>

<script>

async function loadData(){

    try{

        const response = await fetch(
            'https://spin88.sbs/api/webapi/GetNoaverageEmerdList',
            {

                method:'POST',

                mode:'cors',

                headers:{

                    'Accept':
                    'application/json, text/plain, */*',

                    'Content-Type':
                    'application/x-www-form-urlencoded',

                    'X-Requested-With':
                    'XMLHttpRequest'

                },

                body:
                'typeid=1&pageno=0&pageto=10&language=vi'

            }
        );

        const data = await response.json();

        console.log(data);

        const games =
            data.data.gameslist;

        let html = '';

        games.forEach(item=>{

            let size =
                item.amount >= 5
                ? 'BIG'
                : 'SMALL';

            let color =
                item.amount >= 5
                ? 'big'
                : 'small';

            html += `

            <tr>

                <td>
                    <div class="period">
                        ${item.period}
                    </div>
                </td>

                <td>
                    <div class="number ${color}">
                        ${item.amount}
                    </div>
                </td>

                <td>
                    ${size}
                </td>

            </tr>

            `;
        });

        document.getElementById(
            'resultTable'
        ).innerHTML = html;

        document.getElementById(
            'status'
        ).innerText =
            'LIVE CONNECTED';

    }catch(error){

        console.log(error);

        document.getElementById(
            'status'
        ).innerText =
            'API ERROR';

    }

}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
