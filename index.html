<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WINGO REALTIME API</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    font-family:Arial,sans-serif;
    color:white;
    padding:15px;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:#0f172a;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:15px;
}

.status{
    margin-bottom:20px;
    font-size:18px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#334155;
    padding:14px;
    font-size:18px;
}

td{
    border:1px solid #334155;
    padding:14px;
    text-align:center;
}

.period{
    font-size:12px;
    color:#94a3b8;
}

.number{
    width:45px;
    height:45px;
    line-height:45px;
    border-radius:50%;
    display:inline-block;
    font-weight:bold;
    font-size:20px;
}

.big{
    background:#22c55e;
}

.small{
    background:#ef4444;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
    font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
WINGO API REALTIME
</div>

<div id="status" class="status">
CONNECTING...
</div>

<table>

<thead>
<tr>
<th>Period</th>
<th>Number</th>
<th>Size</th>
</tr>
</thead>

<tbody id="resultTable">

</tbody>

</table>

<div class="footer">
AUTO REFRESH 5 DETIK
</div>

</div>

</div>

<script>

async function loadData(){

    try{

        const response =
            await fetch('/api/proxy');

        const data =
            await response.json();

        console.log(data);

        if(!data.data){

            throw new Error(
                'API INVALID'
            );

        }

        const games =
            data.data.gameslist;

        let html = '';

        games.forEach(item=>{

            const size =
                item.amount >= 5
                ? 'BIG'
                : 'SMALL';

            const color =
                item.amount >= 5
                ? 'big'
                : 'small';

            html += `

            <tr>

                <td>
                    <div class="period">
                        ${item.period}
                    </div>
                </td>

                <td>
                    <div class="number ${color}">
                        ${item.amount}
                    </div>
                </td>

                <td>
                    ${size}
                </td>

            </tr>

            `;

        });

        document.getElementById(
            'resultTable'
        ).innerHTML = html;

        document.getElementById(
            'status'
        ).innerText =
            'LIVE CONNECTED';

        document.getElementById(
            'status'
        ).style.color =
            '#22c55e';

    }catch(error){

        console.log(error);

        document.getElementById(
            'status'
        ).innerText =
            'API ERROR';

        document.getElementById(
            'status'
        ).style.color =
            '#ef4444';

    }

}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
